<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Data Extractor</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }

body {
  width: 360px;
  min-height: 520px;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0d1117;
  color: #e6edf3;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  padding: 14px 16px 12px;
  border-bottom: 1px solid #21262d;
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, #238636, #1f6feb);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: #fff;
}
header h1 { font-size: 14px; font-weight: 600; color: #e6edf3; }
.version {
  margin-left: auto;
  font-size: 10px; color: #8b949e;
  background: #21262d;
  padding: 2px 7px; border-radius: 20px;
}

/* ── Mode tabs ── */
.tabs {
  display: flex;
  border-bottom: 1px solid #21262d;
}
.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 12px;
  font-weight: 500;
  color: #8b949e;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .15s;
}
.tab.active {
  color: #58a6ff;
  border-bottom-color: #58a6ff;
  background: #161b22;
}
.tab:hover:not(.active) { color: #c9d1d9; background: #161b22; }

/* ── Tab panels ── */
.panel { display: none; flex-direction: column; flex: 1; }
.panel.active { display: flex; }

/* ── URL bar ── */
.url-bar {
  margin: 10px 14px 0;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 7px 10px;
  font-size: 11px;
  color: #8b949e;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Chat area ── */
.chat { flex:1; overflow-y:auto; padding:10px 14px; display:flex; flex-direction:column; gap:8px; min-height:120px; max-height:200px; }
.msg { max-width:92%; padding:8px 11px; border-radius:10px; font-size:12px; line-height:1.5; }
.msg.bot  { background:#161b22; border:1px solid #30363d; align-self:flex-start; color:#c9d1d9; }
.msg.user { background:#1f6feb; color:#fff; align-self:flex-end; }
.msg.status { background:transparent; border:1px dashed #30363d; color:#6e7681; font-size:10px; align-self:center; text-align:center; width:100%; }

/* ── Result box ── */
.result-box {
  background: #0d1117;
  border: 1px solid #238636;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 11px;
  color: #3fb950;
  align-self: stretch;
}
.result-box .count { font-size: 18px; font-weight: 700; display: block; margin-bottom: 3px; }
.dl-btn {
  margin-top: 8px;
  display: inline-block;
  background: #238636;
  color: #fff;
  padding: 5px 14px;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
  transition: background .15s;
}
.dl-btn:hover { background: #2ea043; }

/* ── Input area ── */
.input-area {
  padding: 10px 14px 14px;
  border-top: 1px solid #21262d;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* Format row */
.fmt-row { display:flex; gap:5px; }
.fmt-btn {
  flex:1;
  background:#161b22;
  border:1px solid #30363d;
  color:#8b949e;
  padding:5px;
  border-radius:5px;
  font-size:10px;
  cursor:pointer;
  text-align:center;
  transition:all .15s;
}
.fmt-btn.active { background:#1f6feb22; border-color:#1f6feb; color:#58a6ff; }

/* Pages input (scraping mode) */
.pages-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: #8b949e;
}
.pages-row input[type=number] {
  width: 60px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 5px;
  padding: 5px 8px;
  color: #e6edf3;
  font-size: 11px;
  outline: none;
}
.pages-row input:focus { border-color: #1f6feb; }

/* Textarea */
textarea {
  width: 100%;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 8px 10px;
  color: #e6edf3;
  font-size: 12px;
  font-family: inherit;
  resize: none;
  outline: none;
  line-height: 1.4;
}
textarea:focus { border-color: #1f6feb; }
textarea::placeholder { color: #484f58; }

/* Send button */
.send-btn {
  width: 100%;
  background: #238636;
  border: none;
  color: #fff;
  padding: 9px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s;
}
.send-btn:hover { background: #2ea043; }
.send-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
.spinner { display:none; width:13px; height:13px; border:2px solid #ffffff44; border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; margin:0 auto; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Medical panel ── */
.upload-zone {
  margin: 10px 14px 0;
  border: 2px dashed #30363d;
  border-radius: 8px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  background: #161b22;
}
.upload-zone:hover { border-color: #58a6ff; background: #1c2128; }
.upload-zone.dragover { border-color: #3fb950; background: #0f1e12; }
.upload-zone .icon { font-size: 24px; margin-bottom: 6px; }
.upload-zone .hint { font-size: 11px; color: #8b949e; line-height: 1.5; }
.upload-zone .hint strong { color: #58a6ff; }
input[type=file] { display: none; }

.file-list {
  margin: 8px 14px 0;
  max-height: 80px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.file-item {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 5px;
  padding: 4px 8px;
  font-size: 10px;
  color: #8b949e;
}
.file-item .fname { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#c9d1d9; }
.file-item .rm { cursor:pointer; color:#6e7681; font-size:12px; line-height:1; }
.file-item .rm:hover { color:#f85149; }

.patient-input {
  margin: 8px 14px 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.patient-input label { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: .04em; }
.patient-input input {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 7px 10px;
  color: #e6edf3;
  font-size: 12px;
  outline: none;
  width: 100%;
}
.patient-input input:focus { border-color: #1f6feb; }
.patient-input input::placeholder { color: #484f58; }

.med-input-area {
  padding: 10px 14px 14px;
  border-top: 1px solid #21262d;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.progress-bar-wrap {
  background: #21262d;
  border-radius: 4px;
  height: 4px;
  overflow: hidden;
  display: none;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #238636, #3fb950);
  width: 0%;
  transition: width .3s;
}
</style>
</head>
<body>

<header>
  <div class="logo">AI</div>
  <h1>AI Data Extractor</h1>
  <div class="version">v2.0</div>
</header>

<!-- Mode tabs -->
<div class="tabs">
  <div class="tab active" id="tab-scrape">Web Scraping</div>
  <div class="tab" id="tab-medical">Medical OCR</div>
</div>

<!-- ── WEB SCRAPING PANEL ── -->
<div class="panel active" id="panel-scrape">
  <div class="url-bar" id="url-bar">Loading current page...</div>
  <div class="chat" id="scrape-chat"></div>
  <div class="input-area">
    <div class="fmt-row">
      <div class="fmt-btn active" data-fmt="csv">CSV</div>
      <div class="fmt-btn" data-fmt="json">JSON</div>
      <div class="fmt-btn" data-fmt="xlsx">XLSX</div>
    </div>
    <div class="pages-row">
      <span>Pages to scrape:</span>
      <input type="number" id="pages-input" value="10" min="1" max="50">
      <span style="font-size:10px;color:#484f58">(~20 records/page)</span>
    </div>
    <textarea id="scrape-prompt" rows="2" placeholder="What data to scrape? e.g. 'smartphones under 20000'"></textarea>
    <button class="send-btn" id="scrape-btn">
      <span id="scrape-label">Scrape</span>
      <div class="spinner" id="scrape-spinner"></div>
    </button>
  </div>
</div>

<!-- ── MEDICAL OCR PANEL ── -->
<div class="panel" id="panel-medical">

  <!-- Upload zone -->
  <div class="upload-zone" id="upload-zone">
    <div class="icon">📄</div>
    <div class="hint">
      <strong>Click to upload</strong> or drag & drop<br>
      OCR .txt files for one patient<br>
      <span style="font-size:10px;color:#484f58">Multiple files allowed</span>
    </div>
  </div>
  <input type="file" id="file-input" multiple accept=".txt">

  <div class="file-list" id="file-list"></div>

  <div class="patient-input">
    <label>Patient ID / Folder Name</label>
    <input type="text" id="patient-id" placeholder="e.g. MANJUNATH_H_B or MRD_3257388">
  </div>

  <div class="progress-bar-wrap" id="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <div class="chat" id="med-chat"></div>

  <div class="med-input-area">
    <div class="fmt-row" id="med-fmt-row">
      <div class="fmt-btn active" data-fmt="csv">CSV</div>
      <div class="fmt-btn" data-fmt="xlsx">Excel</div>
    </div>
    <button class="send-btn" id="med-btn">
      <span id="med-label">Extract Fields</span>
      <div class="spinner" id="med-spinner"></div>
    </button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
